trigger: none

stages:
- stage: 'DEV'
  displayName: 'DEV'
  variables:
  - group: DP-Development-Lib
  - name: IS_INITIAL
    value: 'false'  # Set to 'true' for initial deployment
  - name: RUN_DDL_SCRIPTS
    value: 'true'   # Set to 'false' to skip DDL orchestration
  jobs:
  - deployment: DEV_Deployment
    displayName: DEV Deployment
    pool:
      vmImage: ubuntu-latest
    environment:
      name: 'DP-Development-Env'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            persistCredentials: true
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
          - task: AzureCLI@2
            displayName: 'Install Ingenious'
            inputs:
              azureSubscription: "dp_fabric_sc"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "--------------- Installing Ingenious --------------- "
                pip install git+https://github.com/Insight-Services-APAC/Insight_Ingenious_For_Fabric.git
            env:
              FABRIC_ENVIRONMENT: $(FABRIC_ENVIRONMENT)
              FABRIC_WORKSPACE_REPO_DIR: dp
              IS_INITIAL: $(IS_INITIAL)
              IS_SINGLE_WORKSPACE: $(IS_SINGLE_WORKSPACE)
          - task: AzureCLI@2
            displayName: 'Deploy Fabric artefacts'
            inputs:
              azureSubscription: "dp_fabric_sc"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "--------------- Deploy Fabric artefacts --------------- "
                # Set environment variables based on IS_INITIAL
                if [ "$IS_INITIAL" = "true" ]; then
                  export WORKSPACE_MANIFEST_LOCATION="local"
                  export ITEM_TYPES_TO_DEPLOY="VariableLibrary,Lakehouse"
                else
                  export WORKSPACE_MANIFEST_LOCATION="config_lakehouse"
                  export ITEM_TYPES_TO_DEPLOY=""
                fi
                ingen_fab deploy deploy
            env:
              FABRIC_ENVIRONMENT: $(FABRIC_ENVIRONMENT)
              FABRIC_WORKSPACE_REPO_DIR: dp
              IS_INITIAL: $(IS_INITIAL)
              IS_SINGLE_WORKSPACE: $(IS_SINGLE_WORKSPACE)
          - task: AzureCLI@2
            displayName: 'Update Workspace variables'
            inputs:
              azureSubscription: "dp_fabric_sc"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "--------------- Update Workspace variables --------------- "
                ingen_fab init workspace --workspace-name dp_dev
            env:
              FABRIC_ENVIRONMENT: $(FABRIC_ENVIRONMENT)
              FABRIC_WORKSPACE_REPO_DIR: dp
              IS_INITIAL: $(IS_INITIAL)
              IS_SINGLE_WORKSPACE: $(IS_SINGLE_WORKSPACE)
          - task: AzureCLI@2
            displayName: 'Upload Python Libs'
            inputs:
              azureSubscription: "dp_fabric_sc"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "--------------- Upload Python Libs --------------- "
                ingen_fab deploy upload-python-libs
            env:
              FABRIC_ENVIRONMENT: $(FABRIC_ENVIRONMENT)
              FABRIC_WORKSPACE_REPO_DIR: dp
              IS_INITIAL: $(IS_INITIAL)
              IS_SINGLE_WORKSPACE: $(IS_SINGLE_WORKSPACE)
          - script: |
              git config --global user.email "user@domain.com"
              git config --global user.name "user"
              git add .
              git commit -m "Automated file update from pipeline"
              git push origin HEAD:$(Build.SourceBranchName)
            displayName: 'Commit and push changes to repository'
          - task: AzureCLI@2
            displayName: 'Run DDL Orchestration'
            condition: and(succeeded(), eq(variables['RUN_DDL_SCRIPTS'], 'true'), eq(variables['IS_INITIAL'], 'false'))
            inputs:
              azureSubscription: "dp_fabric_sc"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                echo "--------------- Running DDL Orchestration --------------- "
                # Get access token for Fabric API
                TOKEN=$(az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv)
                
                # Get workspace ID from environment variables
                WORKSPACE_ID=$(python3 -c "import os, sys; sys.path.append('dp'); from ingen_fab.config_utils.variable_lib_factory import get_workspace_id_from_environment; print(get_workspace_id_from_environment('$FABRIC_ENVIRONMENT', 'dp'))")
                
                # Find notebook ID by name
                NOTEBOOK_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
                  "https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/items?type=Notebook" | \
                  python3 -c "import sys, json; items = json.load(sys.stdin).get('value', []); print(next((item['id'] for item in items if item['displayName'] == '00_all_lakehouses_orchestrator_ddl_scripts'), ''))")
                
                if [ -z "$NOTEBOOK_ID" ]; then
                  echo "ERROR: Notebook '00_all_lakehouses_orchestrator_ddl_scripts' not found in workspace"
                  exit 1
                fi
                
                # Execute notebook
                echo "Executing notebook ID: $NOTEBOOK_ID"
                curl -X POST -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  "https://api.fabric.microsoft.com/v1/workspaces/$WORKSPACE_ID/items/$NOTEBOOK_ID/jobs/instances?jobType=RunNotebook"
            env:
              FABRIC_ENVIRONMENT: $(FABRIC_ENVIRONMENT)
              FABRIC_WORKSPACE_REPO_DIR: dp
              IS_INITIAL: $(IS_INITIAL)
              IS_SINGLE_WORKSPACE: $(IS_SINGLE_WORKSPACE)
